<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Создать заявочку</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            ˗ˏˋ ♡ ˎˊ˗ Help Desk
        </a>
        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/}">Главная</a>
            <a class="nav-link" th:href="@{/tickets}">Заявочки</a>
            <a class="nav-link" th:href="@{/about}">О нас</a>
            <a class="nav-link" th:href="@{/contacts}">Контакты</a>
            <a class="nav-link" th:href="@{/faq}">FAQ</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="mb-3">Создание заявки</h1>
                    <form th:action="@{/tickets}" th:object="${ticket}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Ваше имя</label>
                            <input type="text" th:field="*{customerName}" class="form-control"
                                   th:errorclass="is-invalid">
                            <div class="invalid-feedback" th:errors="*{customerName}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Тема</label>
                            <input type="text" th:field="*{title}" class="form-control" th:errorclass="is-invalid">
                            <div class="invalid-feedback" th:errors="*{title}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Описание</label>
                            <textarea th:field="*{description}" rows="5" class="form-control" th:errorclass="is-invalid"></textarea>
                            <div class="invalid-feedback" th:errors="*{description}"></div>
                        </div>
                        <button type="submit" class="btn btn-custom">Отправить</button>
                        <a th:href="@{/tickets}" class="btn btn-custom">Назад</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
