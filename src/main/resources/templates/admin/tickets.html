<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Админ панель | Help Desk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>


<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">˗ˏˋ ♡ ˎˊ˗  Help Desk</a>

        <form th:action="@{/logout}" method="post" class="d-flex">
            <button type="submit" class="btn-exit">Выйти</button>
        </form>
    </div>
</nav>


<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mb-0"> Список заявочек</h1>
        <a th:href="@{/tickets/new}" class="btn btn-custom">🔮 Создать заявку</a>
    </div>

    <div class="table-responsive">
        <table class="table table-striped">
            <thead class="table-primary">
            <tr>
                <th>ID</th>
                <th>Имя</th>
                <th>Тема</th>
                <th>Описание</th>
                <th>Статус</th>
                <th>Дата</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="ticket : ${tickets}">
                <td th:text="${ticket.id}">1</td>
                <td th:text="${ticket.customerName}">Имя</td>
                <td th:text="${ticket.title}">Тема</td>
                <td th:text="${ticket.description}">Описание</td>
                <td><span class="badge bg-secondary" th:text="${ticket.status}">NEW</span></td>
                <td th:text="${#temporals.format(ticket.createdAt, 'dd.MM.yyyy HH:mm')}">01.01.2026 10:00</td>
            </tr>
            <tr th:if="${#lists.isEmpty(tickets)}">
                <td colspan="6" class="text-center text-muted py-4">Пока нет ни одной заявки</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<style>
    .btn-exit {
        background-color: #CDC7E5;
        border: none;
        color: #7776BC;
        border-radius: 30px;
        padding: 6px 16px;
        font-weight: bold;
        transition: 0.3s;
        cursor: pointer;
        font-size: 14px;
    }
    .btn-exit:hover {
        background-color: #7776BC;
        color: #FFFBDB;
    }
</style>

</body>
</html>
