<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход | Help Desk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">˗ˏˋ ♡ ˎˊ˗ Help Desk</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/}">Главная</a>
            <a class="nav-link" th:href="@{/tickets/new}">Создать заявку</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h3 mb-3 text-center" style="color: #FFFBDB;">Вход администратора</h1>

                    <div th:if="${param.error}" class="alert alert-danger">
                        Неверный логин или пароль
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success">
                        Вы вышли из системы
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label">Логин</label>
                            <input type="text" id="username" name="username" class="form-control" placeholder="admin">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Пароль</label>
                            <input type="password" id="password" name="password" class="form-control" placeholder="admin">
                        </div>
                        <button type="submit" class="btn btn-custom w-100">Войти</button>
                    </form>

                    <p class="text-muted small mt-3 text-center">Учебный доступ: admin / admin</p>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
