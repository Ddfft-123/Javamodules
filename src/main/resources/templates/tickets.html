<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Список заявок</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            ˗ˏˋ ♡ ˎˊ˗ Help Desk
        </a>
        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/}">Главная</a>
            <a class="nav-link active" th:href="@{/tickets}">Заявочки</a>
            <a class="nav-link" th:href="@{/about}">О нас</a>
            <a class="nav-link" th:href="@{/contacts}">Контакты</a>
            <a class="nav-link" th:href="@{/faq}">FAQ</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h1>Список заявочек</h1>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Клиентик</th>
            <th>Темка</th>
            <th>Статус</th>
            <th>Дата</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="ticket : ${tickets}">
            <td th:text="${ticket.id}">1</td>
            <td th:text="${ticket.customerName}">Имя</td>
            <td th:text="${ticket.title}">Тема</td>
            <td th:text="${ticket.status}"></td>
            <td th:text="${#strings.substring(ticket.createdAt.toString().replace('T', ' '), 0, 16)}">2026-05-28 10:00</td>
        </tr>
        </tbody>
    </table>
    <a th:href="@{/}" class="btn btn-custom">На главную</a>
</div>

</body>
</html>
